<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#glow)" opacity="0.3"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Title -->
  <text x="600" y="250" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="72" font-weight="bold" fill="#f1f5f9">TypeLate</text>
  <!-- Tagline -->
  <text x="600" y="320" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="28" fill="#fbbf24">Too late to type — just speak.</text>
  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="20" fill="#a1b2c4">Open-source voice-to-text with AI post-processing</text>
  <!-- Badges -->
  <rect x="395" y="420" width="100" height="32" rx="16" fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-opacity="0.3"/>
  <text x="445" y="441" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#fbbf24">Free</text>
  <rect x="510" y="420" width="130" height="32" rx="16" fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-opacity="0.3"/>
  <text x="575" y="441" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#fbbf24">Open Source</text>
  <rect x="655" y="420" width="150" height="32" rx="16" fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-opacity="0.3"/>
  <text x="730" y="441" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#fbbf24">MIT Licensed</text>
</svg>
